  <!-- Decryption Logic -->
  <script>
    var PBKDF2_ITERATIONS = 600000;
    var SALT_LEN = 16;
    var IV_LEN = 12;
    function b64ToUint8(b64) {
      var bin = atob(b64);
      var bytes = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }

    function replacePageContent(html) {
      document.open();
      document.write(html);
      document.close();
    }

    async function handleDecrypt() {
      var password = document.getElementById('passwordInput').value;
      if (!password) return;

      var errorMsg = document.getElementById('errorMsg');
      var submitBtn = document.getElementById('submitBtn');
      var loading = document.getElementById('loadingOverlay');

      errorMsg.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Decrypting...';
      loading.classList.remove('hidden');

      try {
        var encB64 = document.getElementById('encryptedPayload').textContent.trim();
        var encBytes = b64ToUint8(encB64);

        var salt = encBytes.slice(0, SALT_LEN);
        var iv = encBytes.slice(SALT_LEN, SALT_LEN + IV_LEN);
        var ciphertextWithTag = encBytes.slice(SALT_LEN + IV_LEN);

        var encoder = new TextEncoder();
        var passwordKey = await crypto.subtle.importKey(
          'raw', encoder.encode(password), 'PBKDF2', false, ['deriveKey']
        );
        var aesKey = await crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt: salt, iterations: PBKDF2_ITERATIONS, hash: 'SHA-256' },
          passwordKey,
          { name: 'AES-GCM', length: 256 },
          false,
          ['decrypt']
        );

        var decryptedBuf = await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv: iv, tagLength: 128 },
          aesKey,
          ciphertextWithTag
        );

        var decryptedHtml = new TextDecoder().decode(decryptedBuf);

        replacePageContent(decryptedHtml);

      } catch(err) {
        loading.classList.add('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Unlock';
        errorMsg.classList.remove('hidden');
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
      }
    }

    document.getElementById('passwordInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleDecrypt();
    });

    document.getElementById('passwordInput').focus();
